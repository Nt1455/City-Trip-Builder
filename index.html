<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Trip Builder Claude</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --border: #e2ddd6;
    --text: #1a1814;
    --muted: #6b6560;
    --accent: #2d5a27;
    --accent-light: #eaf3e8;
    --radius: 10px;
  }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header p {
    font-size: 14px;
    color: var(--muted);
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.75rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 1.25rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }

  input, select, textarea {
    font-family: 'Heebo', sans-serif;
    font-size: 14px;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: #faf9f7;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: #fff;
  }

  textarea { min-height: 72px; resize: vertical; }

  .btn {
    display: block;
    width: 100%;
    padding: 13px;
    font-family: 'Heebo', sans-serif;
    font-size: 15px;
    font-weight: 600;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 1.5rem;
  }

  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading {
    display: none;
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 14px;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .result-card.visible { display: block; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--accent-light);
  }

  .result-header span {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }

  .btn-copy {
    font-family: 'Heebo', sans-serif;
    font-size: 12px;
    padding: 5px 14px;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-copy:hover { background: var(--accent); color: #fff; }
  .btn-whatsapp { font-family: 'Heebo', sans-serif; font-size: 12px; padding: 5px 14px; border: 1px solid #25d366; border-radius: 6px; background: transparent; color: #25d366; cursor: pointer; transition: background 0.15s; }
  .btn-whatsapp:hover { background: #25d366; color: #fff; }
  .btn-pdf { font-family: 'Heebo', sans-serif; font-size: 12px; padding: 5px 14px; border: 1px solid #e65100; border-radius: 6px; background: transparent; color: #e65100; cursor: pointer; transition: background 0.15s; }
  .btn-pdf:hover { background: #e65100; color: #fff; }

  .result-body h1 { font-size: 18px; font-weight: 600; margin: 1rem 0 0.5rem; color: var(--accent); }
  .result-body h2 { font-size: 16px; font-weight: 600; margin: 1.25rem 0 0.5rem; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .result-body h3 { font-size: 14px; font-weight: 600; margin: 1rem 0 0.4rem; color: var(--text); }
  .result-body table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 13px; }
  .result-body td { padding: 7px 10px; border: 1px solid var(--border); vertical-align: top; }
  .result-body tr:first-child td { background: var(--accent-light); font-weight: 500; }
  .result-body ul { margin: 0.5rem 0 0.5rem 1.25rem; }
  .result-body li { margin-bottom: 4px; font-size: 14px; line-height: 1.6; }
  .result-body hr { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .result-body strong { font-weight: 600; }
  .result-body {
    padding: 1.5rem;
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
    }

  .result-footer {
    padding: 0.75rem 1.5rem;
    border-top: 1px solid var(--border);
    text-align: center;
  }

  .btn-new {
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    padding: 7px 20px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-new:hover { background: var(--bg); }

  .error {
    display: none;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    font-size: 14px;
    color: #991b1b;
    margin-bottom: 1rem;
  }

  .error.visible { display: block; }

  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #faf9f7;
    gap: 0;
  }
  .tab {
    flex: 1;
    padding: 10px 16px;
    font-family: 'Heebo', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--bg); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: #fff; }
  .rec-body { padding: 1.25rem; }
  .rec-section { margin-bottom: 1.5rem; }
  .rec-section h3 { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 0.75rem; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .rec-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid var(--border); gap: 12px; }
  .rec-item:last-child { border-bottom: none; }
  .rec-info { flex: 1; }
  .rec-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
  .rec-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .rec-links { display: flex; flex-direction: column; gap: 5px; min-width: 90px; align-items: flex-end; }
  .rec-link { font-size: 11px; padding: 4px 10px; border-radius: 5px; text-decoration: none; text-align: center; white-space: nowrap; border: 1px solid; transition: opacity 0.15s; }
  .rec-link:hover { opacity: 0.8; }
  .rec-link.maps { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .rec-link.booking { background: #e8f0fe; color: #1a56db; border-color: #1a56db; }
  .rec-link.tripadvisor { background: #fff8e1; color: #b7700c; border-color: #b7700c; }
  .rec-link.viator { background: #e8f5e9; color: #2e7d32; border-color: #2e7d32; }
  .rec-link.getyourguide { background: #fff3e0; color: #e65100; border-color: #e65100; }
  .rec-note { font-size: 12px; color: var(--muted); background: var(--accent-light); border-radius: 6px; padding: 8px 12px; margin-bottom: 1rem; }
  .search-card { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 0.5px solid var(--border); gap: 12px; }
  .search-card:last-child { border-bottom: none; }
  .search-info { flex: 1; }
  .search-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .search-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .search-btns { display: flex; flex-direction: column; gap: 5px; min-width: 100px; align-items: flex-end; }
  .rec-loading { padding: 1.5rem; text-align: center; color: var(--muted); font-size: 14px; display: none; }
  .rec-loading.visible { display: block; }

  @media (max-width: 520px) {
    .grid { grid-template-columns: 1fr; }
    .field.full { grid-column: 1; }
    header h1 { font-size: 22px; }
  }

  @media print {
    body { background: #fff; padding: 0; font-size: 12px; }
    .container { max-width: 100%; }
    header h1 { font-size: 20px; }
    .card, .btn, .loading, .error, #form-card, #build-btn, #error-box { display: none !important; }
    .result-card { display: block !important; border: none; box-shadow: none; }
    .result-header { background: #eaf3e8; padding: 8px 12px; }
    .btn-copy, .btn-new, .tabs { display: none !important; }
    .result-body { padding: 0; font-size: 12px; line-height: 1.6; }
    .result-body h1 { font-size: 16px; page-break-after: avoid; }
    .result-body h2 { font-size: 14px; page-break-after: avoid; margin-top: 16px; }
    .result-body h3 { font-size: 12px; page-break-after: avoid; }
    .result-body table { width: 100%; border-collapse: collapse; page-break-inside: avoid; font-size: 11px; }
    .result-body td { padding: 5px 8px; border: 1px solid #ccc; word-wrap: break-word; }
    .result-body tr { page-break-inside: avoid; }
    .result-body ul { page-break-inside: avoid; }
    .result-body li { font-size: 11px; margin-bottom: 2px; }
    .result-body hr { border-top: 1px solid #ccc; margin: 10px 0; }
    .rec-body { display: none !important; }
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>City Trip Builder Claude</h1>
    <p>מלא את הפרטים - קבל מסלול מפורט לפי שעות</p>
  </header>

  <div class="card" id="api-card">
    <div class="card-title">הגדרות</div>
    <div class="field">
      <label>Anthropic API Key</label>
      <input type="password" id="api-key" placeholder="sk-ant-..." />
      <span style="font-size:11px;color:var(--muted);margin-top:3px;">המפתח נשמר רק בדפדפן שלך ולא נשלח לשום מקום אחר</span>
    </div>
  </div>

  <div class="card" id="form-card">
    <div class="card-title">פרטי הסיור</div>
    <div class="grid">

      <div class="field full">
        <label>לאן נוסעים? *</label>
        <input type="text" id="destination" placeholder="לדוגמה: פלורנציה, ירושלים, ברצלונה" />
      </div>

      <div class="field">
        <label>תאריכים / ימים</label>
        <input type="text" id="dates" placeholder="לדוגמה: 3 ימים, 15-17 ביוני" />
      </div>

      <div class="field">
        <label>עם מי נוסעים?</label>
        <select id="group">
          <option value="">בחר...</option>
          <option>זוג</option>
          <option>משפחה עם ילדים</option>
          <option>חברים</option>
          <option>לבד</option>
          <option>קבוצה מאורגנת</option>
        </select>
      </div>

      <div class="field">
        <label>קצב הליכה</label>
        <select id="pace">
          <option value="">בחר...</option>
          <option>איטי ורגוע</option>
          <option>בינוני</option>
          <option>אינטנסיבי - כמה שיותר</option>
        </select>
      </div>

      <div class="field">
        <label>תחבורה</label>
        <select id="transport">
          <option value="">בחר...</option>
          <option>הליכה ברגל בעיקר</option>
          <option>תחבורה ציבורית</option>
          <option>מונית / Uber</option>
          <option>רכב פרטי</option>
          <option>שילוב</option>
        </select>
      </div>

      <div class="field">
        <label>העדפות אוכל</label>
        <select id="food">
          <option value="">ללא הגבלות</option>
          <option>כשר</option>
          <option>צמחוני / טבעוני</option>
          <option>ללא גלוטן</option>
          <option>חלאל</option>
        </select>
      </div>

      <div class="field">
        <label>תקציב יומי לאדם</label>
        <select id="budget">
          <option value="">לא צוין</option>
          <option>חסכוני עד $50</option>
          <option>בינוני $50-150</option>
          <option>נוח $150-300</option>
          <option>יוקרה $300+</option>
        </select>
      </div>

      <div class="field full">
        <label>תחומי עניין</label>
        <input type="text" id="interests" placeholder="לדוגמה: היסטוריה, אוכל מקומי, אמנות, טבע, שופינג, יהדות" />
      </div>

      <div class="field">
        <label>שעות זמינות ביום</label>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="hour-start" style="flex:1;">
            <option value="06:00">06:00</option><option value="06:30">06:30</option><option value="07:00">07:00</option><option value="07:30">07:30</option><option value="08:00">08:00</option><option value="08:30">08:30</option><option value="09:00" selected>09:00</option><option value="09:30">09:30</option><option value="10:00">10:00</option><option value="10:30">10:30</option><option value="11:00">11:00</option><option value="11:30">11:30</option><option value="12:00">12:00</option><option value="12:30">12:30</option><option value="13:00">13:00</option><option value="13:30">13:30</option><option value="14:00">14:00</option><option value="14:30">14:30</option><option value="15:00">15:00</option><option value="15:30">15:30</option><option value="16:00">16:00</option><option value="16:30">16:30</option><option value="17:00">17:00</option><option value="17:30">17:30</option><option value="18:00">18:00</option><option value="18:30">18:30</option><option value="19:00">19:00</option><option value="19:30">19:30</option><option value="20:00">20:00</option><option value="20:30">20:30</option><option value="21:00">21:00</option><option value="21:30">21:30</option><option value="22:00">22:00</option><option value="22:30">22:30</option><option value="23:00">23:00</option><option value="23:30">23:30</option>
          </select>
          <span style="font-size:13px;color:var(--muted);">עד</span>
          <select id="hour-end" style="flex:1;">
            <option value="06:00">06:00</option><option value="06:30">06:30</option><option value="07:00">07:00</option><option value="07:30">07:30</option><option value="08:00">08:00</option><option value="08:30">08:30</option><option value="09:00">09:00</option><option value="09:30">09:30</option><option value="10:00">10:00</option><option value="10:30">10:30</option><option value="11:00">11:00</option><option value="11:30">11:30</option><option value="12:00">12:00</option><option value="12:30">12:30</option><option value="13:00">13:00</option><option value="13:30">13:30</option><option value="14:00">14:00</option><option value="14:30">14:30</option><option value="15:00">15:00</option><option value="15:30">15:30</option><option value="16:00">16:00</option><option value="16:30">16:30</option><option value="17:00">17:00</option><option value="17:30">17:30</option><option value="18:00">18:00</option><option value="18:30">18:30</option><option value="19:00">19:00</option><option value="19:30">19:30</option><option value="20:00">20:00</option><option value="20:30">20:30</option><option value="21:00" selected>21:00</option><option value="21:30">21:30</option><option value="22:00">22:00</option><option value="22:30">22:30</option><option value="23:00">23:00</option><option value="23:30">23:30</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <input type="checkbox" id="lunch-break" style="width:16px;height:16px;cursor:pointer;" />
          <label for="lunch-break" style="font-size:13px;color:var(--muted);font-weight:400;cursor:pointer;">כולל הפסקת צהריים (עצירה לאוכל + מנוחה)</label>
        </div>
      </div>

      <div class="field">
        <label>היכרות עם היעד</label>
        <textarea id="visited" rows="2" style="min-height:56px;" placeholder="לדוגמה: ביקור ראשון / ביקרתי פעמיים אך רק במרכז / מכיר טוב את הצפון אך לא את הדרום / גר שם שנה בעבר..."></textarea>
      </div>

      <div class="field full">
        <label>מלון / לינה</label>
        <input type="text" id="hotel" placeholder="שם המלון ושכונה - או השאר ריק לקבלת המלצות לינה" />
      </div>

      <div class="field full">
        <label>הערות נוספות</label>
        <textarea id="notes" placeholder="לדוגמה: ילד בן 5, מגבלות ניידות, אלרגיות..."></textarea>
      </div>

    </div>
  </div>

  <div class="error" id="error-box"></div>

  <button class="btn" id="build-btn" onclick="buildTrip()">בנה מסלול מפורט</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    בונה את המסלול שלך...
  </div>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <span id="result-title">המסלול שלך</span>
      <button class="btn-copy" onclick="copyResult()">העתק</button>
      <button class="btn-whatsapp" onclick="sendWhatsApp()">WhatsApp</button>
      <button class="btn-pdf" onclick="window.print()">הורד PDF</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('itinerary')">מסלול</button>
      <button class="tab" onclick="switchTab('recommendations')">המלצות - לינה / אוכל / אטרקציות</button>
    </div>
    <div class="result-body" id="result-body"></div>
    <div class="rec-body" id="rec-body" style="display:none;"></div>
    <div class="result-footer">
      <button class="btn-new" onclick="resetForm()">סיור חדש</button>
    </div>
  </div>

</div>

<script>
const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';

window.addEventListener('load', () => {
  const saved = localStorage.getItem('ctb_api_key');
  if (saved) document.getElementById('api-key').value = saved;
});

function renderMarkdown(text) {
  // Escape HTML
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Tables - collect consecutive rows into one table
  html = html.replace(/((?:^\|.+\|
?)+)/gm, function(block) {
    const rows = block.trim().split('
');
    const tableRows = rows
      .filter(row => !row.match(/^\|[\s\-|]+\|$/))
      .map(row => {
        const cells = row.split('|').filter((c, i, a) => i > 0 && i < a.length - 1);
        return '<tr>' + cells.map(c => '<td>' + c.trim() + '</td>').join('') + '</tr>';
      });
    return '<table>' + tableRows.join('') + '</table>';
  });

  // Headers
  html = html
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold and italic
  html = html
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Lists - collect consecutive items
  html = html.replace(/((?:^- .+
?)+)/gm, function(block) {
    const items = block.trim().split('
')
      .map(line => '<li>' + line.replace(/^- /, '') + '</li>')
      .join('');
    return '<ul>' + items + '</ul>';
  });

  // HR
  html = html.replace(/^---$/gm, '<hr>');

  // Paragraphs
  html = html
    .replace(/

/g, '</p><p>')
    .replace(/
/g, '<br>');

  return html;
}

async function buildTrip() {
  const destination = document.getElementById('destination').value.trim();
  hideError();

  if (!destination) {
    showError('יש להזין יעד נסיעה');
    return;
  }
  setLoading(true);

  const fields = {
    destination,
    dates: document.getElementById('dates').value || 'לא צוין',
    group: document.getElementById('group').value || 'לא צוין',
    pace: document.getElementById('pace').value || 'בינוני',
    transport: document.getElementById('transport').value || 'שילוב',
    food: document.getElementById('food').value || 'ללא הגבלות',
    budget: document.getElementById('budget').value || 'לא צוין',
    interests: document.getElementById('interests').value || 'כללי',
    hours: (() => {
      const s = document.getElementById('hour-start').value || '09:00';
      const e = document.getElementById('hour-end').value || '21:00';
      const lunch = document.getElementById('lunch-break').checked;
      return s + ' עד ' + e + (lunch ? ' (כולל הפסקת צהריים וחידוש פעילות אחריה)' : '');
    })(),
    visited: document.getElementById('visited').value || 'ראשון',
    hotel: document.getElementById('hotel').value || '',
    notes: document.getElementById('notes').value || 'אין',
  };

  const prompt = `בנה מסלול סיור מפורט לפי הפרטים הבאים:

פרטי הסיור:
- יעד: ${fields.destination}
- תאריכים / ימים: ${fields.dates}
- עם מי: ${fields.group}
- שעות זמינות ביום: ${fields.hours}
- ביקור: ${fields.visited}
- קצב הליכה: ${fields.pace}
- תחבורה: ${fields.transport}
- העדפות אוכל: ${fields.food}
- תקציב יומי לאדם: ${fields.budget}
- תחומי עניין: ${fields.interests}
- מלון / לינה: ${fields.hotel ? fields.hotel + ' (השתמש במיקומו כנקודת מוצא לתכנון)' : 'לא צוין - כלול המלצות לינה בסוף המסלול'}
- הערות: ${fields.notes}

כללי בנייה מקצועיים:

1. מבנה היום - לכל יום:
   - כותרת: "יום X - [נושא/אזור]"
   - טבלת שעות: HH:MM-HH:MM | שם המקום | פעולה מומלצת
   - הקפד על ריאליות: כלול 15-20 דקות מעבר בין אתרים סמוכים, 30-45 דקות בין אזורים
   - אל תדחוס יותר מדי - איכות על פני כמות

2. לכל אתר - תן:
   - שם מדויק + שכונה/רחוב
   - מה לראות / לעשות שם (2 משפטים ממוקדים)
   - טיפ insider אחד שרוב התיירים מפספסים
   
3. אוכל - 3 המלצות ליום:
   - בוקר: שם מקום + סוג + מה להזמין
   - צהריים: שם מקום + סוג + מה להזמין
   - ערב: שם מקום + סוג + אווירה
   - התאם בקפדנות להעדפות האוכל שצוינו

4. סיום כל יום:
   - "טיפ היום": עצה מעשית אחת חשובה (כרטיסים מראש, שעות עומס, לבוש מתאים וכו')
   - "אפשרות בונוס": פעילות קצרה אם נשאר זמן

5. התאמות מיוחדות:
   - אם ביקור ראשון: כלול את האתרים הקלאסיים אך הוסף נגיעה מקומית אחת לפחות
   - אם ביקור חוזר: הימנע לחלוטין מאטרקציות תיירותיות ראשיות, התמקד בשכונות מקומיות ומקומות מוסתרים
   - התאם את עצימות המסלול לקצב הליכה שצוין
   - אם יש ילדים - כלול הפסקות ומקומות ידידותיים לילדים

כתוב בעברית, בצורה ברורה, מאורגנת ומעוררת השראה.`;

  try {
    const apiKey = document.getElementById('api-key').value.trim();
    if (apiKey) localStorage.setItem('ctb_api_key', apiKey);
    if (!apiKey) { showError('יש להזין Anthropic API Key'); setLoading(false); return; }

    const systemPrompt = `אתה מדריך סיורים מקצועי ברמת מומחה בינלאומי עם 20 שנות ניסיון בתכנון מסלולים אישיים. אתה מכיר לעומק ערים בישראל ובעולם.

הכללים שלך:
- תמיד בונה מסלול ריאלי - לא דוחס יותר מדי אתרים ביום
- תמיד כותב טבלת שעות מסודרת לכל יום בפורמט: HH:MM-HH:MM | מקום | פעולה
- תמיד כולל זמני מעבר ריאליים בין אתרים
- תמיד ממליץ על אוכל ספציפי לפי ההעדפות שצוינו
- תמיד מוסיף טיפ insider אחד לכל אתר
- אף פעם לא ממציא מקומות שלא קיימים
- אם ביקור חוזר - אף פעם לא מציע אטרקציות תיירותיות ראשיות
- כותב בעברית בלבד, ברורה ומאורגנת`;

    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        temperature: 0.3,
        system: systemPrompt,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!res.ok) throw new Error(`שגיאת שרת: ${res.status}`);

    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '';
    if (!text) throw new Error('לא התקבלה תשובה מהשרת');

    document.getElementById('result-body').innerHTML = renderMarkdown(text);
    document.getElementById('result-title').textContent = `מסלול: ${destination}`;
    document.getElementById('result-card').classList.add('visible');
    document.getElementById('result-card').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (e) {
    showError('שגיאה בבניית המסלול. בדוק חיבור אינטרנט ונסה שוב. (' + e.message + ')');
  }

  setLoading(false);
}

function setLoading(on) {
  document.getElementById('loading').classList.toggle('visible', on);
  document.getElementById('build-btn').disabled = on;
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('error-box').classList.remove('visible');
}

function copyResult() {
  const destination = document.getElementById('destination').value.trim();
  const text = document.getElementById('result-body').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = 'הועתק!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function sendWhatsApp() {
  const destination = document.getElementById('destination').value.trim();
  const text = document.getElementById('result-body').textContent;
  const header = 'מסלול סיור: ' + destination + '\n\n';
  const encoded = encodeURIComponent(header + text);
  window.open('https://wa.me/?text=' + encoded, '_blank');
}

function resetForm() {
  document.getElementById('result-card').classList.remove('visible');
  document.getElementById('destination').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('interests').value = '';
  document.getElementById('dates').value = '';
  document.getElementById('hotel').value = '';
  document.getElementById('hour-start').value = '09:00';
  document.getElementById('hour-end').value = '21:00';
  document.getElementById('lunch-break').checked = false;
  document.getElementById('visited').value = '';
  ['group','pace','transport','food','budget'].forEach(id => {
    document.getElementById(id).selectedIndex = 0;
  });
  document.getElementById('rec-body').innerHTML = '';
  document.getElementById('rec-body').style.display = 'none';
  document.getElementById('result-body').style.display = 'block';
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchTab(tab) {
  const itinerary = document.getElementById('result-body');
  const rec = document.getElementById('rec-body');
  const tabs = document.querySelectorAll('.tab');
  if (tab === 'itinerary') {
    itinerary.style.display = 'block';
    rec.style.display = 'none';
    tabs[0].classList.add('active'); tabs[1].classList.remove('active');
  } else {
    itinerary.style.display = 'none';
    rec.style.display = 'block';
    tabs[1].classList.add('active'); tabs[0].classList.remove('active');
    if (!rec.hasChildNodes()) buildRecommendations();
  }
}

function buildRecommendations() {
  const destination = document.getElementById('destination').value.trim();
  const food = document.getElementById('food').value || '';
  const budget = document.getElementById('budget').value || '';
  const interests = document.getElementById('interests').value || '';
  const hotel = document.getElementById('hotel').value || '';
  const enc = encodeURIComponent;

  const foodQuery = (food && food !== 'ללא הגבלות') ? food + ' restaurant ' + destination : 'restaurant ' + destination;
  const budgetTag = budget.includes('יוקרה') ? 'luxury ' : budget.includes('נוח') ? 'boutique ' : '';
  const attractQuery = interests ? interests.split(',')[0].trim() + ' ' + destination : 'top attractions ' + destination;

  document.getElementById('rec-body').innerHTML = `
    <div class="rec-note">החיפושים נפתחים בזמן אמת - תוצאות עדכניות ומדויקות</div>

    <div class="rec-section">
      <h3>לינה</h3>
      <div class="search-card">
        <div class="search-info">
          <div class="search-label">${hotel ? 'מלונות באזור: ' + hotel : 'מלונות ב-' + destination}</div>
          <div class="search-sub">${budget ? 'תקציב: ' + budget : 'כל הרמות'}</div>
        </div>
        <div class="search-btns">
          <a class="rec-link booking" href="https://www.booking.com/search.html?ss=${enc(destination)}" target="_blank">Booking.com</a>
          <a class="rec-link maps" href="https://www.google.com/maps/search/${enc(budgetTag + 'hotel ' + destination)}" target="_blank">Google Maps</a>
        </div>
      </div>
    </div>

    <div class="rec-section">
      <h3>מסעדות</h3>
      <div class="search-card">
        <div class="search-info">
          <div class="search-label">מסעדות ב-${destination}</div>
          <div class="search-sub">${food ? 'סינון: ' + food : 'כל הסגנונות'}</div>
        </div>
        <div class="search-btns">
          <a class="rec-link maps" href="https://www.google.com/maps/search/${enc(foodQuery)}" target="_blank">Google Maps</a>
          <a class="rec-link tripadvisor" href="https://www.tripadvisor.com/Search?q=${enc(foodQuery)}" target="_blank">TripAdvisor</a>
        </div>
      </div>
      ${food === 'כשר' ? `<div class="search-card" style="margin-top:8px;">
        <div class="search-info">
          <div class="search-label">מסעדות כשרות בלבד</div>
          <div class="search-sub">חיפוש ממוקד</div>
        </div>
        <div class="search-btns">
          <a class="rec-link maps" href="https://www.google.com/maps/search/${enc('kosher restaurant ' + destination)}" target="_blank">Google Maps</a>
        </div>
      </div>` : ''}
    </div>

    <div class="rec-section">
      <h3>אטרקציות</h3>
      <div class="search-card">
        <div class="search-info">
          <div class="search-label">אטרקציות ב-${destination}</div>
          <div class="search-sub">${interests ? 'תחומי עניין: ' + interests : 'כל הקטגוריות'}</div>
        </div>
        <div class="search-btns">
          <a class="rec-link maps" href="https://www.google.com/maps/search/${enc(attractQuery)}" target="_blank">Google Maps</a>
          <a class="rec-link tripadvisor" href="https://www.tripadvisor.com/Search?q=${enc(attractQuery)}" target="_blank">TripAdvisor</a>
        </div>
      </div>
    </div>

    <div class="rec-section">
      <h3>כרטיסים מראש</h3>
      <div class="search-card">
        <div class="search-info">
          <div class="search-label">הזמנת סיורים וכרטיסים</div>
          <div class="search-sub">מונע המתנה בתורים</div>
        </div>
        <div class="search-btns">
          <a class="rec-link viator" href="https://www.viator.com/search/${enc(destination)}" target="_blank">Viator</a>
          <a class="rec-link getyourguide" href="https://www.getyourguide.com/s/?q=${enc(destination)}" target="_blank">GetYourGuide</a>
        </div>
      </div>
    </div>
  `;
}
