<!-- City Trip Builder Claude - v1.5 - 28/04/2026 -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Trip Builder Claude</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f7f5f0;--surface:#fff;--border:#e2ddd6;--text:#1a1814;--muted:#6b6560;--accent:#2d5a27;--accent-light:#eaf3e8;--radius:10px}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
.container{max-width:720px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:26px;font-weight:600;margin-bottom:4px}
header p{font-size:14px;color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
label{font-size:13px;font-weight:500;color:var(--muted)}
input,select,textarea{font-family:'Heebo',sans-serif;font-size:14px;padding:8px 11px;border:1px solid var(--border);border-radius:8px;background:#faf9f7;color:var(--text);outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:#fff}
textarea{min-height:68px;resize:vertical}
.interest-btn{font-family:'Heebo',sans-serif;font-size:13px;padding:5px 13px;border:1px solid var(--border);border-radius:20px;background:#faf9f7;color:var(--muted);cursor:pointer;transition:all .15s}
.interest-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-build{display:block;width:100%;padding:13px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;transition:opacity .15s;margin-bottom:1.5rem}
.btn-build:hover{opacity:.9}
.btn-build:disabled{opacity:.5;cursor:not-allowed}
.loading{display:none;text-align:center;padding:1.5rem;color:var(--muted);font-size:14px}
.loading.visible{display:block}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--radius);padding:1rem;font-size:14px;color:#991b1b;margin-bottom:1rem}
.error.visible{display:block}
.result-card{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.result-card.visible{display:block}
.result-header{display:flex;justify-content:space-between;align-items:center;padding:.875rem 1.25rem;border-bottom:1px solid var(--border);background:var(--accent-light);flex-wrap:wrap;gap:8px}
.result-title{font-size:14px;font-weight:600;color:var(--accent)}
.result-btns{display:flex;gap:6px;flex-wrap:wrap}
.rbtn{font-family:'Heebo',sans-serif;font-size:12px;padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;border:1px solid}
.rbtn-maps{background:transparent;color:#1967d2;border-color:#1967d2}
.rbtn-maps:hover{background:#1967d2;color:#fff}
.rbtn-copy{background:transparent;color:var(--accent);border-color:var(--accent)}
.rbtn-copy:hover{background:var(--accent);color:#fff}
.rbtn-wa{background:transparent;color:#25d366;border-color:#25d366}
.rbtn-wa:hover{background:#25d366;color:#fff}
.rbtn-pdf{background:transparent;color:#e65100;border-color:#e65100}
.rbtn-pdf:hover{background:#e65100;color:#fff}
.tabs{display:flex;border-bottom:1px solid var(--border);background:#faf9f7}
.tab{flex:1;padding:9px 12px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);background:#fff}
.result-body{padding:1.25rem;font-size:14px;line-height:1.85;color:var(--text)}
.result-body h1{font-size:17px;font-weight:600;margin:1rem 0 .4rem;color:var(--accent)}
.result-body h2{font-size:15px;font-weight:600;margin:1.2rem 0 .4rem;color:var(--accent);border-bottom:1px solid var(--border);padding-bottom:3px}
.result-body h3{font-size:14px;font-weight:600;margin:.9rem 0 .3rem}
.result-body table{width:100%;border-collapse:collapse;margin:.75rem 0;font-size:13px}
.result-body td{padding:6px 9px;border:1px solid var(--border);vertical-align:top}
.result-body tr:first-child td{background:var(--accent-light);font-weight:500}
.result-body ul{margin:.5rem 0 .5rem 1.2rem}
.result-body li{margin-bottom:3px;font-size:14px;line-height:1.6}
.result-body hr{border:none;border-top:1px solid var(--border);margin:1.2rem 0}
.result-body strong{font-weight:600}
.rec-body{padding:1.25rem}
.rec-note{font-size:12px;color:var(--muted);background:var(--accent-light);border-radius:6px;padding:7px 11px;margin-bottom:1rem}
.rec-section{margin-bottom:1.5rem}
.rec-section h3{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:.75rem;padding-bottom:5px;border-bottom:1px solid var(--border)}
.search-card{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid var(--border);gap:10px}
.search-card:last-child{border-bottom:none}
.search-info{flex:1}
.search-label{font-size:14px;font-weight:500}
.search-sub{font-size:12px;color:var(--muted);margin-top:2px}
.search-btns{display:flex;flex-direction:column;gap:5px;min-width:95px;align-items:flex-end}
.rec-link{font-size:11px;padding:4px 10px;border-radius:5px;text-decoration:none;text-align:center;white-space:nowrap;border:1px solid;transition:opacity .15s}
.rec-link:hover{opacity:.8}
.rec-link.maps{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.rec-link.booking{background:#e8f0fe;color:#1a56db;border-color:#1a56db}
.rec-link.tripadvisor{background:#fff8e1;color:#b7700c;border-color:#b7700c}
.rec-link.viator{background:#e8f5e9;color:#2e7d32;border-color:#2e7d32}
.rec-link.gyg{background:#fff3e0;color:#e65100;border-color:#e65100}.rec-link.wa{background:#e8f5e9;color:#25d366;border-color:#25d366}
.result-footer{padding:.75rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.btn-new{font-family:'Heebo',sans-serif;font-size:13px;padding:6px 18px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer}
.btn-new:hover{background:var(--bg)}
@media(max-width:520px){.grid{grid-template-columns:1fr}.field.full{grid-column:1}header h1{font-size:22px}}
@media print{
  body{background:#fff;padding:0;font-size:12px}
  .container{max-width:100%}
  #api-card,#form-card,.btn-build,.loading,.error,.result-btns,.tabs,.result-footer{display:none!important}
  .result-card{display:block!important;border:none}
  .result-header{background:#eaf3e8;padding:8px 12px}
  .result-body{padding:0;font-size:12px;line-height:1.6}
  .result-body table{page-break-inside:avoid;font-size:11px}
  .result-body td{padding:5px 8px;border:1px solid #ccc}
  .result-body tr{page-break-inside:avoid}
  .result-body ul{page-break-inside:avoid}
  .rec-body{display:none!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>City Trip Builder Claude</h1>
  <p>מלא את הפרטים - קבל מסלול מפורט לפי שעות</p>
  <button onclick="toggleHistory()" style="margin-top:8px;font-family:'Heebo',sans-serif;font-size:12px;padding:5px 14px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer">📂 מסלולים שמורים</button>
</header>

<div id="history-panel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
    <span style="font-size:14px;font-weight:600">מסלולים שמורים</span>
    <button onclick="toggleHistory()" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px">&times;</button>
  </div>
  <div id="history-list" style="font-size:14px;color:var(--muted)">אין מסלולים שמורים עדיין</div>
</div>

<div class="card" id="api-card">
  <div class="card-title">הגדרות</div>
  <div class="field">
    <label>מפתח API של Claude (Anthropic) 🔑</label>
    <input type="password" id="api-key" placeholder="sk-ant-..." />
    <span style="font-size:11px;color:var(--muted);margin-top:2px">המפתח לא נשמר ולא נשלח לשום מקום מלבד Anthropic</span>
  </div>
</div>

<div class="card" id="form-card">
  <div class="card-title">פרטי הסיור</div>
  <div class="grid">

    <div class="field full">
      <label>לאן נוסעים? *</label>
      <input type="text" id="destination" placeholder="לדוגמה: פלורנציה, ירושלים, ברצלונה" />
    </div>

    <div class="field">
      <label>תאריכים</label>
      <div style="display:flex;gap:6px;align-items:center">
        <div style="flex:1;position:relative">
          <input type="text" id="date-start" placeholder="DD/MM/YYYY" readonly style="cursor:pointer;background:#faf9f7" onclick="openCal('date-start')" />
        </div>
        <span style="font-size:13px;color:var(--muted)">עד</span>
        <div style="flex:1;position:relative">
          <input type="text" id="date-end" placeholder="DD/MM/YYYY" readonly style="cursor:pointer;background:#faf9f7" onclick="openCal('date-end')" />
        </div>
      </div>
    </div>

    <div class="field">
      <label>&nbsp;</label>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <div style="flex:2;display:flex;flex-direction:column;gap:5px">
          <label>עם מי נוסעים?</label>
          <select id="group">
            <option value="">בחר...</option>
            <option>זוג</option>
            <option>משפחה עם ילדים</option>
            <option>חברים</option>
            <option>לבד</option>
            <option>קבוצה מאורגנת</option>
          </select>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:5px">
          <label>מספר אנשים</label>
          <input type="number" id="num-people" min="1" max="50" value="2" />
        </div>
      </div>
    </div>

    <div class="field">
      <label>קצב הליכה</label>
      <select id="pace">
        <option value="">בחר...</option>
        <option>איטי ורגוע</option>
        <option>בינוני</option>
        <option>אינטנסיבי - כמה שיותר</option>
      </select>
    </div>

    <div class="field">
      <label>תחבורה</label>
      <select id="transport">
        <option value="">בחר...</option>
        <option>הליכה ברגל בעיקר</option>
        <option>תחבורה ציבורית</option>
        <option>מונית / Uber</option>
        <option>רכב פרטי</option>
        <option>שילוב</option>
      </select>
    </div>

    <div class="field">
      <label>העדפות אוכל</label>
      <select id="food">
        <option value="">ללא הגבלות</option>
        <option>כשר</option>
        <option>צמחוני / טבעוני</option>
        <option>ללא גלוטן</option>
        <option>חלאל</option>
      </select>
    </div>

    <div class="field">
      <label>תקציב יומי לאדם</label>
      <select id="budget">
        <option value="">לא צוין</option>
        <option>חסכוני עד $50</option>
        <option>בינוני $50-150</option>
        <option>נוח $150-300</option>
        <option>יוקרה $300+</option>
      </select>
    </div>

    <div class="field full">
      <label>תחומי עניין</label>
      <div id="interest-wrap" style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px">
        <button type="button" class="interest-btn active" onclick="toggleInterest(this)">היסטוריה</button>
        <button type="button" class="interest-btn active" onclick="toggleInterest(this)">אמנות</button>
        <button type="button" class="interest-btn active" onclick="toggleInterest(this)">אוכל מקומי</button>
        <button type="button" class="interest-btn active" onclick="toggleInterest(this)">שופינג</button>
        <button type="button" class="interest-btn" onclick="toggleInterest(this)">טבע</button>
        <button type="button" class="interest-btn active" onclick="toggleInterest(this)">יהדות</button>
        <button type="button" class="interest-btn" onclick="toggleInterest(this)">מוזיקה</button>
        <button type="button" class="interest-btn" onclick="toggleInterest(this)">ספורט</button>
        <button type="button" class="interest-btn" onclick="toggleInterest(this)">אדריכלות</button>
        <button type="button" class="interest-btn" onclick="toggleInterest(this)">חיי לילה</button>
      </div>
      <input type="text" id="interests-extra" placeholder="תחומי עניין נוספים (אופציונלי)..." />
    </div>

    <div class="field full">
      <label>אזורים - רחובות שווקים מעניינים ומיוחדים</label>
      <input type="text" id="areas" placeholder="לדוגמה: נחלאות, שוק מחנה יהודה, העיר העתיקה..." />
    </div>

    <div class="field">
      <label>שעות זמינות ביום</label>
      <div style="display:flex;gap:6px;align-items:center">
        <select id="hour-start" style="flex:1">
          <option value="06:00">06:00</option><option value="06:30">06:30</option><option value="07:00">07:00</option><option value="07:30">07:30</option><option value="08:00">08:00</option><option value="08:30">08:30</option><option value="09:00" selected>09:00</option><option value="09:30">09:30</option><option value="10:00">10:00</option><option value="10:30">10:30</option><option value="11:00">11:00</option><option value="11:30">11:30</option><option value="12:00">12:00</option><option value="12:30">12:30</option><option value="13:00">13:00</option><option value="13:30">13:30</option><option value="14:00">14:00</option><option value="14:30">14:30</option><option value="15:00">15:00</option><option value="15:30">15:30</option><option value="16:00">16:00</option><option value="16:30">16:30</option><option value="17:00">17:00</option><option value="17:30">17:30</option><option value="18:00">18:00</option><option value="18:30">18:30</option><option value="19:00">19:00</option><option value="19:30">19:30</option><option value="20:00">20:00</option><option value="20:30">20:30</option><option value="21:00">21:00</option><option value="21:30">21:30</option><option value="22:00">22:00</option><option value="22:30">22:30</option><option value="23:00">23:00</option><option value="23:30">23:30</option>
        </select>
        <span style="font-size:13px;color:var(--muted)">עד</span>
        <select id="hour-end" style="flex:1">
          <option value="06:00">06:00</option><option value="06:30">06:30</option><option value="07:00">07:00</option><option value="07:30">07:30</option><option value="08:00">08:00</option><option value="08:30">08:30</option><option value="09:00">09:00</option><option value="09:30">09:30</option><option value="10:00">10:00</option><option value="10:30">10:30</option><option value="11:00">11:00</option><option value="11:30">11:30</option><option value="12:00">12:00</option><option value="12:30">12:30</option><option value="13:00">13:00</option><option value="13:30">13:30</option><option value="14:00">14:00</option><option value="14:30">14:30</option><option value="15:00">15:00</option><option value="15:30">15:30</option><option value="16:00">16:00</option><option value="16:30">16:30</option><option value="17:00">17:00</option><option value="17:30">17:30</option><option value="18:00">18:00</option><option value="18:30">18:30</option><option value="19:00">19:00</option><option value="19:30">19:30</option><option value="20:00">20:00</option><option value="20:30">20:30</option><option value="21:00" selected>21:00</option><option value="21:30">21:30</option><option value="22:00">22:00</option><option value="22:30">22:30</option><option value="23:00">23:00</option><option value="23:30">23:30</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:7px;margin-top:5px">
        <input type="checkbox" id="lunch-break" style="width:16px;height:16px;cursor:pointer" />
        <label for="lunch-break" style="font-size:13px;font-weight:400;cursor:pointer">כולל הפסקת צהריים (עצירה לאוכל + מנוחה)</label>
      </div>
    </div>

    <div class="field">
      <label>היכרות עם היעד</label>
      <textarea id="visited" placeholder="לדוגמה: ביקור ראשון / ביקרתי פעמיים אך רק במרכז / מכיר טוב את הצפון אך לא את הדרום..."></textarea>
    </div>

    <div class="field full">
      <label>מלון / לינה</label>
      <input type="text" id="hotel" placeholder="שם המלון ושכונה - או השאר ריק לקבלת המלצות לינה" />
    </div>

    <div class="field full">
      <label>הערות נוספות</label>
      <textarea id="notes" placeholder="לדוגמה: ילד בן 5, מגבלות ניידות, אלרגיות..."></textarea>
    </div>

  </div>
</div>
<div id="cal-popup" style="display:none;position:fixed;z-index:9999;background:#fff;border:1px solid #e2ddd6;border-radius:10px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);min-width:280px"></div>

<div class="error" id="error-box"></div>
<button class="btn-build" id="build-btn" onclick="buildTrip()">בנה מסלול מפורט</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  בונה את המסלול שלך...
</div>

<div class="result-card" id="result-card">
  <div class="result-header">
    <span class="result-title" id="result-title">המסלול שלך</span>
    <div class="result-btns">
      <button class="rbtn rbtn-maps" onclick="openInMaps()">🗺 Google Maps</button>
      <button class="rbtn rbtn-wa" onclick="sendWhatsApp()">📱 וואטסאפ</button>
      <button class="rbtn rbtn-pdf" onclick="window.print()">🖨 PDF</button>
      <button class="rbtn rbtn-copy" onclick="copyResult()">העתק</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('itinerary')">מסלול</button>
    <button class="tab" onclick="switchTab('recommendations')">המלצות - לינה / אוכל / אטרקציות</button>
  </div>
  <div class="result-body" id="result-body"></div>
  <div class="rec-body" id="rec-body" style="display:none"></div>
  <div class="edit-section" id="edit-section" style="display:none;padding:1rem 1.25rem;border-top:1px solid var(--border)">
    <div style="font-size:13px;font-weight:500;color:var(--muted);margin-bottom:6px">בקשת עריכה</div>
    <textarea id="edit-request" placeholder="לדוגמה: הזז את הביקור במוזיאון ליום 2 בשעה 14:00 / החלף את המסעדה בצהריים ביום 1..." style="min-height:72px;margin-bottom:8px"></textarea>
    <button class="btn-build" style="margin:0" onclick="editItinerary()">עדכן מסלול</button>
  </div>
  <div class="result-footer">
    <span id="version-tag" style="font-size:11px;color:var(--muted)">גרסה 1</span>
    <div style="display:flex;gap:8px">
      <button class="btn-new" onclick="saveItinerary()">💾 שמור מסלול</button>
      <button class="btn-new" onclick="toggleEdit()">✏️ ערוך</button>
      <button class="btn-new" onclick="resetForm()">סיור חדש</button>
    </div>
  </div>
</div>

</div>
<script>
const API = 'https://api.anthropic.com/v1/messages';

window.addEventListener('load', () => {
  const k = localStorage.getItem('ctb_key');
  if (k) document.getElementById('api-key').value = k;
});

function toggleInterest(btn) { btn.classList.toggle('active'); }

function getInterests() {
  const btns = Array.from(document.querySelectorAll('.interest-btn.active')).map(b => b.textContent);
  const extra = document.getElementById('interests-extra').value;
  if (extra) btns.push(extra);
  return btns.join(', ') || 'כללי';
}

function renderMarkdown(text) {
  let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/((?:^\|.+\|\n?)+)/gm, block => {
    const rows = block.trim().split('\n')
      .filter(r => !/^\|[\s\-|]+\|$/.test(r))
      .map(r => {
        const cells = r.split('|').filter((_,i,a) => i>0 && i<a.length-1);
        return '<tr>' + cells.map(c => '<td>'+c.trim()+'</td>').join('') + '</tr>';
      });
    return '<table>' + rows.join('') + '</table>';
  });
  h = h.replace(/^### (.+)$/gm,'<h3>$1</h3>')
       .replace(/^## (.+)$/gm,'<h2>$1</h2>')
       .replace(/^# (.+)$/gm,'<h1>$1</h1>')
       .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
       .replace(/\*(.+?)\*/g,'<em>$1</em>');
  h = h.replace(/((?:^- .+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => '<li>'+l.replace(/^- /,'')+'</li>').join('');
    return '<ul>'+items+'</ul>';
  });
  h = h.replace(/^---$/gm,'<hr>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return h;
}

async function buildTrip() {
  const dest = document.getElementById('destination').value.trim();
  document.getElementById('error-box').classList.remove('visible');
  if (!dest) { showError('יש להזין יעד נסיעה'); return; }
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) { showError('יש להזין Anthropic API Key'); return; }
  localStorage.setItem('ctb_key', apiKey);
  setLoading(true);

  const ds = document.getElementById('date-start').value;
  const de = document.getElementById('date-end').value;
  const dates = (ds && de) ? ds+' עד '+de : (ds||'לא צוין');
  const num = document.getElementById('num-people').value || '2';
  const group = document.getElementById('group').value || '';
  const hs = document.getElementById('hour-start').value;
  const he = document.getElementById('hour-end').value;
  const lunch = document.getElementById('lunch-break').checked;
  const hotel = document.getElementById('hotel').value;

  const fields = {
    dest, dates,
    group: num + ' ' + (group||'אנשים'),
    pace: document.getElementById('pace').value || 'בינוני',
    transport: document.getElementById('transport').value || 'שילוב',
    food: document.getElementById('food').value || 'ללא הגבלות',
    budget: document.getElementById('budget').value || 'לא צוין',
    interests: getInterests(),
    areas: document.getElementById('areas').value || '',
    hours: hs+' עד '+he+(lunch?' (כולל הפסקת צהריים)':''),
    visited: document.getElementById('visited').value || 'ראשון',
    hotel: hotel ? hotel+' (השתמש במיקומו כנקודת מוצא)' : 'לא צוין - כלול המלצות לינה בסוף',
    notes: document.getElementById('notes').value || 'אין',
  };

  const system = `אתה מדריך סיורים מקצועי ברמת מומחה עם 20 שנות ניסיון. הכללים שלך:
- בונה מסלול ריאלי - לא דוחס יותר מדי אתרים
- כותב טבלת שעות מסודרת לכל יום בפורמט מדויק: HH:MM-HH:MM | שם המקום + כתובת מלאה | פעולה
  דוגמה: 10:00-11:30 | שוק מחנה יהודה - רח' מחנה יהודה, ירושלים | סיור בשוק וסמטאות
  חובה: כל שורה בטבלה חייבת לכלול כתובת מדויקת - לא רק שם המקום
- כולל זמני מעבר ריאליים בין אתרים
- מוסיף טיפ insider לכל אתר
- לא ממציא מקומות שלא קיימים
- מסעדות - כללים קריטיים:
  * אם הסיור מתחיל תוך פחות מ-48 שעות: המלץ רק על מסעדות ללא הזמנה מראש
  * אם הסיור בעוד יותר מ-48 שעות: אפשר להמליץ גם על מסעדות שדורשות הזמנה
  * לצד כל מסעדה ציין: (ללא הזמנה) או (מומלץ להזמין מראש) או (הזמנה חובה)
  * לעולם אל תמליץ על מסעדה שדורשת המתנה של יותר משבוע אם הסיור קרוב
- לכל ארוחה (בוקר/צהריים/ערב) הצע 2-3 אפשרויות ברמות תקציב/סגנון שונים
- בביקור חוזר - לא מציע אטרקציות תיירותיות ראשיות
- אם צוין מלון/לינה - הוסף בתחילת המסלול סעיף "חניה" עם 2-3 חניונים ציבוריים קרובים למלון:
  * שם החניון + כתובת מדויקת + מחיר משוער ליום + שעות פתיחה
  * ציין את המרחק בהליכה מהמלון
- כותב בעברית בלבד`;

  const prompt = `בנה מסלול סיור מפורט:
- יעד: ${fields.dest}
- תאריכים: ${fields.dates}
- קבוצה: ${fields.group}
- שעות: ${fields.hours}
- היכרות: ${fields.visited}
- קצב: ${fields.pace}
- תחבורה: ${fields.transport}
- אוכל: ${fields.food}
- תקציב: ${fields.budget}
- תחומי עניין: ${fields.interests}
- אזורים מועדפים: ${fields.areas||'לא צוין'}
- מלון: ${fields.hotel}

לכל יום: כותרת + טבלת שעות + המלצות אוכל (בוקר/צהריים/ערב) + טיפ insider + טיפ היום + אפשרות בונוס.`;

  try {
    const res = await fetch(API, {
      method: 'POST',

      },
      body: JSON.stringify({

        max_tokens: 4000,
        temperature: 0.3,

        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const msg = errData?.error?.message || 'שגיאת שרת ' + res.status;
      if (res.status === 401) throw new Error('API Key שגוי או פג תוקף - בדוק את המפתח');
      if (res.status === 429) throw new Error('חריגה ממגבלת שימוש - נסה שוב בעוד דקה');
      throw new Error(msg);
    }
    const data = await res.json();
    const text = data.content?.map(b=>b.text||'').join('')||'';
    if (!text) throw new Error('לא התקבלה תשובה');
    document.getElementById('result-body').innerHTML = renderMarkdown(text);
    document.getElementById('result-title').textContent = 'מסלול: '+fields.dest;
    document.getElementById('result-card').classList.add('visible');
    document.getElementById('result-card').scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    showError('שגיאה: '+e.message);
  }
  setLoading(false);

// Google Maps - extract places and open
function openInMaps() {
  const text = document.getElementById('result-body').textContent;
  const dest = document.getElementById('destination').value.trim();

  const lines = text.split('\n');
  const places = [];
  for (const line of lines) {
    const parts = line.split('|');
    if (parts.length >= 2) {
      const place = parts[1].trim();
      if (place && place.length > 2 && place.length < 60 && !place.includes('מקום') && !place.includes('שעה')) {
        places.push(place + ' ' + dest);
      }
    }
  }

  if (places.length === 0) {
    window.open('https://www.google.com/maps/search/' + encodeURIComponent(dest), '_blank');
    return;
  }

  // Build directions URL with all waypoints (max 10)
  const waypoints = places.slice(0, 10).map(p => encodeURIComponent(p)).join('/');
  window.open('https://www.google.com/maps/dir/' + waypoints, '_blank');
}

  const dest = document.getElementById('destination').value.trim();

  const name = prompt('שם המסלול:', dest + ' - ' + new Date().toLocaleDateString('he-IL'));

  const saved = JSON.parse(localStorage.getItem('ctb_history') || '[]');
  saved.unshift({ name, dest, html: text, date: new Date().toLocaleDateString('he-IL'), version: itineraryVersion });
  if (saved.length > 10) saved.pop(); // max 10
  localStorage.setItem('ctb_history', JSON.stringify(saved));

  renderHistory();

// Custom Calendar
let calTarget = null;
const MONTHS_HE = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const DAYS_HE = ['א','ב','ג','ד','ה','ו','ש'];
let calYear, calMonth;

function openCal(id) {
  calTarget = id;
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  const val = document.getElementById(id).value;
  if (val && val.length === 10) {
    const parts = val.split('/');
    if (parts.length === 3) {
      calMonth = parseInt(parts[1]) - 1;
      calYear = parseInt(parts[2]);
    }
  }
  const input = document.getElementById(id);
  const rect = input.getBoundingClientRect();
  const popup = document.getElementById('cal-popup');
  const popupWidth = 280;
  // Position: below input, align right edge if near right side of screen
  let left = rect.left;
  if (left + popupWidth > window.innerWidth - 10) {
    left = rect.right - popupWidth;
  }
  popup.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  popup.style.left = Math.max(5, left) + 'px';
  popup.style.display = 'block';
  renderCal();
  setTimeout(() => document.addEventListener('click', closeCal), 10);
}

function closeCal(e) {
  const popup = document.getElementById('cal-popup');
  const t = e.target;
  if (!popup.contains(t) && t.id !== 'date-start' && t.id !== 'date-end') {
    popup.style.display = 'none';
    document.removeEventListener('click', closeCal);
  }
}

function renderCal() {
  const popup = document.getElementById('cal-popup');
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today = new Date();

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  html += '<button onclick="event.stopPropagation();calNav(-1)" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 8px">&lsaquo;</button>';
  html += '<span style="font-weight:600;font-size:14px">' + MONTHS_HE[calMonth] + ' ' + calYear + '</span>';
  html += '<button onclick="event.stopPropagation();calNav(1)" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 8px">&rsaquo;</button>';
  html += '</div>';
  html += '<table style="width:100%;border-collapse:collapse;text-align:center">';
  html += '<tr>' + DAYS_HE.map(d => '<th style="font-size:11px;color:#6b6560;padding:4px">' + d + '</th>').join('') + '</tr><tr>';

  for (let i = 0; i < firstDay; i++) html += '<td></td>';

  let dayCount = firstDay;
  for (let d = 1; d <= daysInMonth; d++) {
    const dd = String(d).padStart(2,'0');
    const mm = String(calMonth+1).padStart(2,'0');
    const dayStr = dd + '/' + mm + '/' + calYear;
    const isToday = d===today.getDate() && calMonth===today.getMonth() && calYear===today.getFullYear();
    const bg = isToday ? '#2d5a27' : '#fff';
    const col = isToday ? '#fff' : '#1a1814';
    html += '<td onclick="selectDate(\`' + dayStr + '\`)" style="padding:4px;font-size:13px;cursor:pointer;border-radius:50%;width:32px;height:32px;background:' + bg + ';color:' + col + '">' + d + '</td>';
    dayCount++;
    if (dayCount % 7 === 0 && d < daysInMonth) html += '</tr><tr>';
  }
  html += '</tr></table>';
  popup.innerHTML = html;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCal();
}

function selectDate(dateStr) {
  document.getElementById(calTarget).value = dateStr;
  document.getElementById('cal-popup').style.display = 'none';
  document.removeEventListener('click', closeCal);
}

</script>
</body>
</html>
